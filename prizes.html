<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Призовой фонд турнира STX League MD — 2500 MDL + приз MVP.">
    <meta name="theme-color" content="#0a0a0f">
    <title>Призы — STX League MD</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230a0a0f'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='%23a855f7' font-family='sans-serif'>S</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-host"></div>

<section id="prizes" class="reveal" style="padding-top:140px">
    <div class="container">
        <div class="sec-tag" data-i18n="prizes.tag">Призы</div>
        <h2 class="sec-title" data-i18n="prizes.title">Призовой фонд</h2>
        <p class="sec-sub" data-i18n="prizes.sub">Общий призовой фонд — 2 500 MDL</p>
        <div class="prizes-grid">
            <div class="prize-card bronze">
                <div class="prize-place" data-i18n="prizes.place3">3 МЕСТО</div>
                <div class="prize-icon"><svg viewBox="0 0 50 50" fill="currentColor"><path d="M25 4l3.5 11h9.5l-7.5 5.5 3 10.5-8.5-6-8.5 6 3-10.5-7.5-5.5h9.5L25 4z" opacity=".7"/></svg></div>
                <div class="prize-amount">375</div>
                <div class="prize-cur" data-i18n="prizes.cur">MDL</div>
            </div>
            <div class="prize-card gold">
                <div class="prize-place" data-i18n="prizes.place1">1 МЕСТО</div>
                <div class="prize-icon"><svg viewBox="0 0 50 50" fill="currentColor"><path d="M25 4l3.5 12h10l-8 6 3 11-8.5-6.5L16.5 33l3-11-8-6h10L25 4z"/></svg></div>
                <div class="prize-amount">1 500</div>
                <div class="prize-cur" data-i18n="prizes.cur">MDL</div>
            </div>
            <div class="prize-card silver">
                <div class="prize-place" data-i18n="prizes.place2">2 МЕСТО</div>
                <div class="prize-icon"><svg viewBox="0 0 50 50" fill="currentColor"><path d="M25 4l3.5 11.5h10l-7.5 5.5 3 10-9-6.5-9 6.5 3-10-7.5-5.5h10L25 4z" opacity=".8"/></svg></div>
                <div class="prize-amount">625</div>
                <div class="prize-cur" data-i18n="prizes.cur">MDL</div>
            </div>
        </div>
        <div class="mvp-badge" data-i18n="prizes.mvp"><strong>MVP турнира</strong> получает эксклюзивный приз от организаторов!</div>
    </div>
</section>

<div id="footer-host"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/settings.js"></script>
<script src="js/common.js"></script>
<script src="js/background.js?v=20260703"></script>
</body>
</html>
