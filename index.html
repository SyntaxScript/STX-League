<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="STX League MD — турнир по CS2 в Молдове. 16 команд, 5v5, Single Elimination, регистрация команд, призы и прямые матчи.">
    <meta name="theme-color" content="#0a0a0f">
    <title>STX League MD — Турнир по CS2</title>
    <script>
        document.documentElement.classList.add('site-loading');
    </script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #06060b;
    }
    html.site-loading body {
        visibility: hidden;
    }
    body {
        overflow: hidden;
    }
    body.ready {
        visibility: visible;
        overflow-x: hidden;
        overflow-y: auto;
    }
    #site-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg, #0a0a0f);
        transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #site-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }
    .loader-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
    }
    .loader-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 64px;
        letter-spacing: 8px;
        color: #a855f7;
        text-shadow: 0 0 20px rgba(124, 58, 237, 0.35);
        animation: loaderPulse 1.4s ease-in-out infinite;
    }
    .loader-text {
        font-size: 14px;
        color: #94a3b8;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .loader-bar {
        width: 180px;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255,255,255,0.08);
    }
    .loader-bar span {
        display: block;
        width: 35%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #a855f7 0%, #7c3aed 45%, #facc15 100%);
        animation: loaderMove 1.1s ease-in-out infinite;
    }
    @keyframes loaderPulse {
        0%, 100% { transform: scale(0.97); opacity: 0.9; }
        50% { transform: scale(1.03); opacity: 1; }
    }
    @keyframes loaderMove {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(280%); }
    }
</style>

<div id="site-loader" aria-hidden="true">
    <div class="loader-card">
        <div class="loader-title">STX</div>
        <div class="loader-bar"><span></span></div>
        <div class="loader-text">Загрузка...</div>
    </div>
</div>

<div id="nav-host"></div>

<!-- HERO -->
<section class="hero" id="hero">
    <!-- canvas id="bg" УДАЛЁН — паутина теперь через js/background.js на всех страницах -->
    <div class="hero-overlay"></div>
    <div class="hero-inner">
        <div class="hero-tag" data-i18n="hero.tag">Киберспортивный турнир • Молдова 2026</div>
        <h1>STX <span>LEAGUE</span> MD</h1>
        <div class="hero-slogan" id="tw"></div>
        <div class="countdown" id="cd">
            <div class="cd-item"><div class="cd-num" id="cdD">00</div><div class="cd-lbl" data-i18n="hero.cd.days">Дней</div></div>
            <div class="cd-item"><div class="cd-num" id="cdH">00</div><div class="cd-lbl" data-i18n="hero.cd.hours">Часов</div></div>
            <div class="cd-item"><div class="cd-num" id="cdM">00</div><div class="cd-lbl" data-i18n="hero.cd.mins">Минут</div></div>
            <div class="cd-item"><div class="cd-num" id="cdS">00</div><div class="cd-lbl" data-i18n="hero.cd.secs">Секунд</div></div>
        </div>
        <div class="hero-btns">
            <a href="register.html" class="btn-primary" data-i18n="hero.btn.register">Зарегистрировать команду</a>
            <a href="about.html" class="btn-secondary" data-i18n="hero.btn.more">Подробнее</a>
        </div>
    </div>
</section>

<div id="footer-host"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/settings.js"></script>
<script src="js/common.js"></script>
<script src="js/background.js?v=20260703"></script>
<script src="js/hero.js"></script>
<script>
    window.addEventListener('load', function () {
        requestAnimationFrame(function () {
            const loader = document.getElementById('site-loader');
            if (loader) {
                loader.classList.add('hidden');
            }
            document.documentElement.classList.remove('site-loading');
            document.body.classList.add('ready');
        });
    });
</script>
</body>
</html>
