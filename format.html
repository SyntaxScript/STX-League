<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Формат турнира STX League MD: 16 команд, Single Elimination, маппул CS2.">
    <meta name="theme-color" content="#0a0a0f">
    <title>Формат — STX League MD</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230a0a0f'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='%23a855f7' font-family='sans-serif'>S</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-host"></div>

<section id="format" class="alt" style="padding-top:140px">
    <div class="container">
        <div class="sec-tag" data-i18n="format.tag">Формат</div>
        <h2 class="sec-title" data-i18n="format.title">Турнирная сетка</h2>
        <p class="sec-sub" data-i18n="format.sub">16 команд • Single Elimination</p>
        <div class="format-row">
            <div class="format-info">
                <h3 data-i18n="format.rules.title">Регламент</h3>
                <p>&#9654; <span data-i18n="format.r1"><strong>1/8 финала:</strong> Best of 1 (Bo1)</span></p>
                <p>&#9654; <span data-i18n="format.r2"><strong>1/4 финала:</strong> Best of 3 (Bo3)</span></p>
                <p>&#9654; <span data-i18n="format.r3"><strong>Полуфинал:</strong> Best of 3 (Bo3)</span></p>
                <p>&#9654; <span data-i18n="format.r4"><strong>Гранд-финал:</strong> Best of 5 (Bo5)</span></p>
                <p>&#9654; <span data-i18n="format.r5"><strong>Матч за 3-е место:</strong> Best of 1 (Bo1)</span></p>
                <h3 style="margin-top:20px" data-i18n="format.maps.title">Маппул</h3>
                <div class="map-pool">
                    <span class="map-badge">Mirage</span>
                    <span class="map-badge">Inferno</span>
                    <span class="map-badge">Anubis</span>
                    <span class="map-badge">Nuke</span>
                    <span class="map-badge">Ancient</span>
                    <span class="map-badge">Dust2</span>
                    <span class="map-badge">Vertigo</span>
                    <span class="map-badge">Cache</span>
                </div>
            </div>
            <div class="bracket-box">
                <iframe src="https://challonge.com/ru/stxleague/module" width="100%" height="500" frameborder="0" scrolling="auto" allowtransparency="true"></iframe>
            </div>
        </div>
    </div>
</section>

<div id="footer-host"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/common.js"></script>
</body>
</html>
